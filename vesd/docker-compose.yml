services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  server:
    image: node:20
    working_dir: /app/server
    command: sh -c "npm install && npm run dev"
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      MONGO_URI: mongodb://mongo:27017/vesd
      JWT_SECRET: dev_secret_change_me
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5173
    volumes:
      - ./:/app
    depends_on:
      - mongo
  client:
    image: node:20
    working_dir: /app/client
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api/v1
      VITE_APP_NAME: VESD
    volumes:
      - ./:/app
    depends_on:
      - server
volumes:
  mongo_data:

